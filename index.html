<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starkmetall | B2B Kunden-Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f3f4f6; }
        .cyber-gradient { background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #030712 70%); }
        .neon-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4); }
    </style>
</head>
<body class="font-sans antialiased min-h-screen cyber-gradient flex flex-col justify-center items-center p-4">

    <div id="portalLoginScreen" class="w-full max-w-md bg-gray-900/80 border border-gray-800 p-8 rounded-3xl space-y-6 shadow-2xl text-center">
        <div class="w-16 h-16 bg-gradient-to-tr from-amber-500 to-orange-600 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto shadow-lg shadow-amber-500/10">
            <i class="fa-solid fa-building-shield"></i>
        </div>
        <div class="space-y-1">
            <h2 class="text-2xl font-extrabold tracking-tight text-white">Starkmetall <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-400">B2B Portal</span></h2>
            <p class="text-xs text-gray-400">Geben Sie Ihren Firmennamen oder Ihre Kundennummer ein.</p>
        </div>
        
        <div class="space-y-3">
            <input type="text" id="partnerLoginId" placeholder="z.B. CNC-Technik Müller" class="w-full bg-gray-950/80 border border-gray-800 rounded-xl px-4 py-3.5 text-sm text-white focus:outline-none focus:border-amber-500 transition font-medium text-center">
            
            <p id="loginError" class="hidden text-xs text-red-400 font-semibold"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Zugang nicht aktiv oder falsch geschrieben.</p>
        </div>

        <button onclick="checkPortalLogin()" class="w-full bg-gradient-to-r from-amber-500 via-orange-500 to-yellow-600 text-white font-bold py-3.5 rounded-xl text-sm transition tracking-wider uppercase text-[11px]">Identität verifizieren</button>
    </div>

    <div id="portalMainContent" class="hidden w-full max-w-2xl neon-card p-8 rounded-3xl space-y-6 text-center">
        <div class="w-12 h-12 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center text-xl mx-auto">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <div class="space-y-2">
            <h1 class="text-2xl font-black text-white">Willkommen im Starkmetall-Netzwerk!</h1>
            <p class="text-sm text-gray-400">Ihr Firmenkonto bei <strong id="loggedPartnerName" class="text-amber-400"></strong> ist verifiziert und voll aktiv.</p>
        </div>
        
        <div class="p-4 bg-gray-950/50 rounded-xl border border-gray-800 text-left space-y-2">
            <p class="text-xs text-gray-400 uppercase tracking-wider font-bold"><i class="fa-solid fa-user-shield text-purple-400 mr-1.5"></i>Ihr persönlicher Betreuer:</p>
            <p class="text-sm font-bold text-white" id="assignedAgentDisplay">Zentrale / Digitale Abwicklung</p>
        </div>

        <div class="pt-4 flex gap-4">
            <button onclick="logoutPortal()" class="flex-1 bg-gray-900 hover:bg-gray-800 text-gray-400 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition border border-gray-800">Abmelden</button>
            <a href="https://bensen123.github.io/Starkmetall-demo/" class="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition text-center flex items-center justify-center shadow-lg shadow-amber-500/10">Direkt zur Avisierung</a>
        </div>
    </div>

    <script>
        function checkPortalLogin() {
            const inputName = document.getElementById("partnerLoginId").value.trim();
            const error = document.getElementById("loginError");
            
            // 1. Holt sich die ECHTEN, von dir im Admin-Dashboard angelegten Partner ab!
            const realPartners = JSON.parse(localStorage.getItem("partners")) || [];
            
            // 2. Prüfen, ob der eingegebene Name existiert
            const foundPartner = realPartners.find(p => p.name.toLowerCase() === inputName.toLowerCase());
            
            if (foundPartner) {
                // Login erfolgreich!
                error.classList.add("hidden");
                document.getElementById("portalLoginScreen").classList.add("hidden");
                document.getElementById("portalMainContent").classList.remove("hidden");
                
                // Namen und Agenten im System eintragen und anzeigen
                document.getElementById("loggedPartnerName").innerText = foundPartner.name;
                document.getElementById("assignedAgentDisplay").innerText = foundPartner.agent ? foundPartner.agent + " (Direktdurchwahl aktiv)" : "Zentrale / Digitale Abwicklung";
                
                localStorage.setItem("current_logged_partner", foundPartner.name);
            } else {
                // Fehler ausgeben
                error.classList.remove("hidden");
            }
        }

        // Automatisch einloggen, falls Session noch aktiv ist
        window.addEventListener('DOMContentLoaded', () => {
            const alreadyLogged = localStorage.getItem("current_logged_partner");
            if (alreadyLogged) {
                document.getElementById("partnerLoginId").value = alreadyLogged;
                checkPortalLogin();
            }
        });

        function logoutPortal() {
            localStorage.removeItem("current_logged_partner");
            location.reload();
        }
    </script>
</body>
</html>
